{% extends 'base.html' %} {% block title %} Home | CineVerse {% endblock %}
{%block content %}

<div class="container px-3">
  <div class="auth-card mx-auto p-4 p-md-5">
    <div class="text-center mb-4">
      <h1 class="h3 mb-2">Home Page</h1>
      
      <form
      method="POST"
      action="{% url 'user:logout_user' %}"
      class="vstack gap-3"
    >
      {% csrf_token %}

      <button type="submit" class="btn btn-primary btn-lg w-100">Logout</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}

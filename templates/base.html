<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CineVerse{% endblock title %}</title>
    {% comment %} bootstrap css {% endcomment %}
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      :root {
        --cv-bg: #f4f7fb;
        --cv-surface: rgba(255, 255, 255, 0.92);
        --cv-border: rgba(15, 23, 42, 0.08);
        --cv-text: #0f172a;
        --cv-muted: #64748b;
      }

      body {
        background:
          radial-gradient(
            circle at top,
            rgba(13, 110, 253, 0.08),
            transparent 30%
          ),
          linear-gradient(180deg, #ffffff 0%, var(--cv-bg) 100%);
        color: var(--cv-text);
      }

      .page-shell {
        min-height: 100vh;
      }

      .page-note {
        color: var(--cv-muted);
        font-size: 0.95rem;
      }

      .auth-card {
        max-width: 460px;
        width: 100%;
        background: var(--cv-surface);
        border: 1px solid var(--cv-border);
        border-radius: 1.25rem;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(12px);
      }

      .brand-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.45rem 0.85rem;
        border-radius: 999px;
        background: rgba(13, 110, 253, 0.1);
        color: #0d6efd;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .form-control {
        border-radius: 0.85rem;
        border-color: #d6deea;
      }

      .form-control:focus {
        border-color: #86b7fe;
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.12);
      }

      .flash-stack {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        width: min(92vw, 560px);
        z-index: 1080;
      }
    </style>
  </head>
  <body>
    <main class="page-shell d-flex align-items-center py-5">
      {% if messages %}
      <div class="flash-stack vstack gap-2">
        {% for message in messages %}
        <div
          class="alert {% if 'error' in message.tags %}alert-danger{% elif 'success' in message.tags %}alert-success{% elif 'warning' in message.tags %}alert-warning{% else %}alert-info{% endif %} alert-dismissible fade show border-0 shadow-sm rounded-3 mb-0"
          role="alert"
        >
          <div class="d-flex align-items-center justify-content-between gap-2">
            <span class="small fw-semibold">{{ message }}</span>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="alert"
              aria-label="Close"
            ></button>
          </div>
        </div>
        {% endfor %}
      </div>
      {% endif %}
      {% block content %}{% endblock content %}
    </main>

    {% comment %} bootstrap js {% endcomment %}
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

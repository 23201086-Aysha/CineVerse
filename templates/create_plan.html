{% extends 'base.html' %}

{% block title %}Create Subscription Plan{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">Create Subscription Plan</h1>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Plan Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="plan_type">Plan Type</label>
            <select class="form-control" id="plan_type" name="plan_type" required>
                <option value="free">Free</option>
                <option value="basic">Basic</option>
                <option value="premium">Premium</option>
            </select>
        </div>

        <div class="form-group">
            <label for="price">Price (BDT)</label>
            <input type="number" step="0.01" class="form-control" id="price" name="price" required>
        </div>

        <div class="form-group">
            <label for="duration_days">Duration (Days)</label>
            <input type="number" class="form-control" id="duration_days" name="duration_days" required>
        </div>

        <button type="submit" class="btn btn-primary">Create Plan</button>
        <a href="{% url 'subscription:plans' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %} {% block title %} Login | CineVerse {% endblock %}
{%block content %}

<div class="container px-3">
  <div class="auth-card mx-auto p-4 p-md-5">
    <div class="text-center mb-4">
      <span class="brand-pill mb-3">CineVerse</span>
      <h1 class="h3 mb-2">Login to your account</h1>
      <p class="page-note mb-0">Enter your movie space</p>
    </div>

    <form
      method="POST"
      action="{% url 'user:login_user' %}"
      class="vstack gap-3"
    >
      {% csrf_token %}
      <div>
        <input
          type="text"
          class="form-control form-control-lg"
          name="username"
          placeholder="Username"
          required
        />
      </div>
      <div>
        <input
          type="password"
          class="form-control form-control-lg"
          name="password"
          placeholder="Password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>

      <p class="text-center mb-0 page-note">
        Don't have an account?
        <a
          href="{% url 'user:register_user' %}"
          class="link-primary text-decoration-none"
          >Register</a
        >
      </p>
    </form>
  </div>
</div>

{% endblock %}

<h2>Edit Movie</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" value="{{ movie.title|default:'' }}"><br>

    <textarea name="description">{{ movie.description|default:'' }}</textarea><br>

    <input type="date" name="release_date" value="{{ movie.release_date|date:'Y-m-d' }}"><br>

    <select name="genre">
        {% for g in genres %}
            <option value="{{ g.id }}"
                {% if movie.genre and g.id == movie.genre.id %}selected{% endif %}>
                {{ g.name }}
            </option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Update</button>
</form>

<a href="{% url 'movie_list' %}">Back</a>

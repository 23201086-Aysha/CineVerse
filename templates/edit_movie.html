<h2>Edit Movie</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" value="{{ movie.title }}"><br>

    <textarea name="description">{{ movie.description }}</textarea><br>

    <input type="date" name="release_date" value="{{ movie.release_date }}"><br>

    <select name="genre">
        {% for g in genres %}
            <option value="{{ g.id }}" {% if g.id == movie.genre.id %}selected{% endif %}>
                {{ g.name }}
            </option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Update</button>
</form>
